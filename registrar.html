<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="css/estiloR.css" />
  </head>
  <body class="pagina-registrar">
    <header class="encabezado">
      <img
        src="https://img.magnific.com/vector-premium/logotipo-restaurante-bistec-tenedor-cuchillo_1240970-33805.jpg?semt=ais_hybrid&w=740&q=80"
        alt="Logo EcoFood"
      />

      <h1>Bienvenido a FoodSave</h1>
      <h2>Crea tu cuenta</h2>
      <p>Crea una cuenta para no perderte todas las novedades</p>
    </header>

    <main>
      <form class="registro_form" id="form_Registro">
        <div class="grupo">
          <label for="nombres">Nombres</label>
          <input
            type="text"
            id="nombres"
            name="nombres"
            placeholder="Nombre"
            required
          />
        </div>

        <div class="grupo">
          <label for="apellidos">Apellidos</label>
          <input
            type="text"
            id="apellidos"
            name="apellidos"
            placeholder="Apellido"
            required
          />
        </div>

        <div class="grupo">
          <label for="nacimiento">Fecha de nacimiento</label>
          <input type="date" id="nacimiento" name="nacimiento" required />
        </div>

        <div class="grupo">
          <label for="genero">Género</label>
          <select id="genero" name="genero" required>
            <option value="" selected disabled>Seleccione</option>
            <option>Masculino</option>
            <option>Femenino</option>
            <option>Otro</option>
          </select>
        </div>

        <div class="grupo correo">
          <label for="correo">Correo electrónico</label>
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="correo@ejemplo.com"
            required
          />
        </div>

        <div class="grupo">
          <label for="password">Contraseña</label>
          <div class="ver-contra">
            <input type="password" id="password" name="password" required />
            <button type="button" id="verPassword">👁️</button>
          </div>
        </div>

        <div class="grupo">
          <label for="password2">Confirmar contraseña</label>
          <div class="ver-contra">
            <input type="password" id="password2" name="password2" required />
            <button type="button" id="verPassword2">👁️</button>
          </div>
        </div>

        <label class="terminos">
          <input type="checkbox" required />
          Acepto los términos y condiciones
        </label>

        <button type="submit">Crear Cuenta</button>

        <p class="cuentita">
          ¿Ya tienes cuenta?
          <a href="login.html">click aquí</a>
        </p>
      </form>
    </main>
    <script src="js/register.js"></script>
  </body>
</html>
